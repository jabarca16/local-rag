services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - uploads:/tmp/uploads
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - rag_net

  worker:
    build: .
    command: celery -A worker.celery_app worker --concurrency=1 --loglevel=info
    env_file: .env
    volumes:
      - uploads:/tmp/uploads
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - rag_net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_net

volumes:
  uploads:
  qdrant_data:
  redis_data:

networks:
  rag_net:
    driver: bridge
